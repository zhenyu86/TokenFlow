{% extends "base.html" %}

{% block title %}修改密码 - Token Manager{% endblock %}

{% block content %}
<div class="form-container">
    <h1>修改密码</h1>
    
    <form method="POST" class="form">
        <div class="form-group">
            <label for="new_password">新密码</label>
            <input type="password" name="new_password" id="new_password" class="form-control" required minlength="6" placeholder="请输入新密码（至少6位）">
        </div>
        
        <div class="form-group">
            <label for="confirm_password">确认新密码</label>
            <input type="password" name="confirm_password" id="confirm_password" class="form-control" required minlength="6" placeholder="请再次输入新密码">
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">修改密码</button>
            <a href="{{ url_for('user.dashboard') }}" class="btn btn-secondary">取消</a>
        </div>
    </form>
</div>
{% endblock %}
