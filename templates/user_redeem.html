{% extends "base.html" %}

{% block title %}{{ ui_text.redeem_code }} - {{ project_name }}{% endblock %}

{% block content %}
<div class="dashboard">
    <div class="page-header">
        <h1>{{ ui_text.redeem_code }}</h1>
    </div>
    
    <div class="form-container" style="max-width: 500px; margin: 0 auto;">
        <div class="form-section">
            <div class="section-title" style="background: #f0fff4; border-color: #9ae6b4;">
                <span class="section-icon">🎫</span>
                <span>输入{{ code_name }}兑换{{ resource_name_plural }}</span>
            </div>
            <form method="POST">
                <div class="form-group">
                    <label>请输入{{ code_name }}</label>
                    <input type="text" name="code" class="form-control" placeholder="输入8位{{ code_name }}" style="text-transform: uppercase; font-size: 18px; text-align: center; letter-spacing: 4px;" maxlength="8" required>
                </div>
                <button type="submit" class="btn btn-success btn-block">{{ ui_text.redeem_code }}</button>
            </form>
        </div>
    </div>
</div>

<style>
.form-section {
    background: white;
    border: 1px solid var(--border-color);
    border-radius: 16px;
    overflow: hidden;
    padding: 24px;
}

.section-title {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 16px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 2px solid var(--border-color);
}

.section-icon {
    font-size: 20px;
}
</style>
{% endblock %}
